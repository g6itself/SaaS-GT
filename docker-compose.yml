version: "3.9"

services:
  # ─────────────────────────────────────────
  #  PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dev_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  #  pgAdmin (interface web PostgreSQL)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev_pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  #  Backend + Frontend Rust (Actix-web + Leptos SSR)
  # ─────────────────────────────────────────
  rust-app:
    build:
      context: ./rust-app
      dockerfile: Dockerfile.dev
    container_name: dev_rust
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      LEPTOS_SITE_ADDR: "0.0.0.0:3000"
      LEPTOS_SITE_ROOT: "target/site"
      JWT_SECRET: ${JWT_SECRET}
      STEAM_API_KEY: ${STEAM_API_KEY}
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./rust-app:/app
      - rust_registry:/usr/local/cargo/registry
      - rust_target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
    command: cargo leptos watch

  # ─────────────────────────────────────────
  #  Frontend Node.js (conserve pour transition)
  # ─────────────────────────────────────────
  node-app:
    build:
      context: ./node-app
      dockerfile: Dockerfile.dev
    container_name: dev_node
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "3100:3000"
    volumes:
      - ./node-app:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

# ─────────────────────────────────────────
#  Volumes nommes (stockes dans Docker)
# ─────────────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:
  rust_registry:   # Cache du registre Cargo
  rust_target:     # Artefacts de compilation Rust
  node_modules:    # node_modules isoles du host
