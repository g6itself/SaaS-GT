# ─── PostgreSQL 17 — Config Production (VPS 2-4 GB RAM) ─────────────────────
#
# Profil : VPS standard 2-4 GB RAM, SSD
# Priorités : durabilité des données, sécurité, performances équilibrées
# ─────────────────────────────────────────────────────────────────────────────

# ── Connexions ────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 100           # Réduit en prod (pool SQLx = 10 par défaut)

# ── Mémoire (adapté VPS 2 GB — ajuster si plus de RAM) ───────────────────────
shared_buffers = 512MB          # 25% RAM
effective_cache_size = 1536MB   # 75% RAM
work_mem = 4MB                  # Conservateur : 100 connexions × 4MB = 400MB max
maintenance_work_mem = 128MB
temp_buffers = 8MB

# ── Write-Ahead Log (durabilité maximale en prod) ─────────────────────────────
synchronous_commit = on         # IMPORTANT : durabilité garantie (vs off en dev)
wal_level = replica             # Permet sauvegarde PITR si besoin
max_wal_size = 2GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
wal_compression = on

# ── Planificateur ─────────────────────────────────────────────────────────────
random_page_cost = 1.1          # SSD
effective_io_concurrency = 200
default_statistics_target = 100

# ── Parallélisme ─────────────────────────────────────────────────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_parallel_maintenance_workers = 1

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 1min

# ── Logging (minimal en prod — uniquement les requêtes lentes et erreurs) ─────
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000  # Log requêtes > 1s seulement
log_checkpoints = on
log_lock_waits = on
log_temp_files = 10MB
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# ── Locale & encodage ─────────────────────────────────────────────────────────
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# ── Performances réseau ───────────────────────────────────────────────────────
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6
